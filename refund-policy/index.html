        <h1>退款政策</h1>
        <h2>未发货订单</h2>
        <p>未发货订单可联系客服申请取消。已发货订单如需退换，请先保留完整卡片、包装、订单信息和物流记录。</p>
        <h2>已发货或已激活订单</h2>
        <p>实体 SIM 卡一经激活、充值、绑定账户或影响二次销售，通常不支持无理由退款。</p>
        <h2>异常情况处理</h2>
        <p>如因发错商品、运输损坏或卡片本身异常导致无法使用，我们会根据实际情况协助补发、换货或退款。</p>
        <p>第三方平台验证失败、用户设备不兼容、付款方式限制或 giffgaff 官方规则变化，不等同于卡片质量问题。</p>
