      <section class="order-lookup-hero">
        <div class="home-shell order-lookup-grid">
          <div>
            <p class="policy-kicker">Order Tracking</p>
            <h1>订单查询与物流查询</h1>
            <p>输入下单时填写的手机号码，即可查询 giffgaff 实体 SIM 卡订单状态、发货状态、物流单号和物流图片。</p>

              <input name="phone" type="tel" inputmode="numeric" autocomplete="tel" maxlength="11" placeholder="请输入 11 位手机号" required />

            <p data-order-lookup-message>仅支持查询使用该手机号提交的订单，不展示完整收货地址。</p>

        </div>
